name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build (Next.js) — includes TypeScript checks
        run: npm run build

      - name: Smoke test — start server briefly
        run: |
          npx serve -s .next -l 3000 &
          sleep 2
          curl -fS localhost:3000 || true
